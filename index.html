<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reminder Alert 💖</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ffd6e0, #ffb3c6);
  font-family: sans-serif;
  overflow: hidden;
  text-align: center;
}

/* Hearts */
.heart {
  position: absolute;
  animation: floatUp 6s linear infinite;
  color: pink;
}
@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Card */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: white;
  padding: 40px;
  border-radius: 20px;
  opacity: 0;
  transition: 0.6s;
}
.card.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

button {
  margin-top: 40vh;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="btn">Tap me 😚</button>

<div class="card" id="card">
  <h2>🚨 Reminder Alert 🚨</h2>
  <p>
    Sidra Tun Muntaha loves you a little too much 💕<br><br>
    She has the BIGGEST crush on you 😚✨<br><br>
    And also…<br>
    YOU ARE REALLY REALLY HANDSOME 😍
  </p>
</div>

<script>
// Fix click issue
document.getElementById("btn").addEventListener("click", function() {
  document.getElementById("card").classList.add("show");
});

// Floating hearts
function heart(){
  const h = document.createElement("div");
  h.className="heart";
  h.innerHTML="💗";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
setInterval(heart,400);
</script>

</body>
</html>
